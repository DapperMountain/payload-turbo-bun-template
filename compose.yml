services:
  app:
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/payload-multi-tenant-template/Dockerfile
      args:
        PROJECT: "@dappermountain/payload-multi-tenant-template"
        PROJECT_PATH: "apps/payload-multi-tenant-template"
        # Raise (e.g. 4096) if `bun install` OOMs; use 0 if your builder forbids swap
        BUILD_SWAP_MB: 2048
    # Install from monorepo root (workspace), then run Next in the app package.
    # A named volume for `.next` avoids bind-mounting a host (e.g. macOS) Turbopack cache into Linux — that mismatch causes ENOENT for `.next/dev/.../build-manifest.json`.
    command: sh -c 'cd /app && bun install && cd apps/payload-multi-tenant-template && exec bun dev'
    env_file:
      - apps/payload-multi-tenant-template/.env
    ports:
      - 3001:3000
    volumes:
      - .:/app
      - app_cache:/app/apps/payload-multi-tenant-template/.next
    depends_on:
      - db

  db:
    restart: unless-stopped
    image: timescale/timescaledb:latest-pg17
    healthcheck:
      test: ["CMD-SHELL", "g_isready -U ${DATABASE_USER:-payload} -d ${DATABASE_NAME:-payload}"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-payload}
      POSTGRES_USER: ${DATABASE_USER:-payload}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-payload}
    ports:
      - 5442:5432
    volumes:
      - data:/var/lib/postgresql/data

  db-test:
    restart: unless-stopped
    image: timescale/timescaledb:latest-pg17
    healthcheck:
      test: ["CMD-SHELL", "g_isready -U ${DATABASE_USER:-payload} -d ${DATABASE_NAME:-payload}"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-payload}
      POSTGRES_USER: ${DATABASE_USER:-payload}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-payload}
    ports:
      - 5443:5432
    volumes:
      - data_test:/var/lib/postgresql/data
volumes:
  data:
  app_cache:
  data_test:
